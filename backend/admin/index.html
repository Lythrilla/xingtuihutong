<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>星推互通 · 管理后台</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">星</span>
          <span>
            <strong>星推互通</strong>
            <small>运营管理中心</small>
          </span>
        </div>
        <nav id="nav">
          <span class="nav-section">概览</span>
          <button class="nav-item active" data-view="overview">总览</button>
          <button class="nav-item" data-view="analytics">数据</button>
          <button class="nav-item" data-view="reports">报表</button>
          <span class="nav-section">业务</span>
          <button class="nav-item" data-view="users">入驻审核</button>
          <button class="nav-item" data-view="partners">公开主页</button>
          <button class="nav-item" data-view="songs">曲库</button>
          <button class="nav-item" data-view="plans">方案</button>
          <button class="nav-item" data-view="matches">需求</button>
          <button class="nav-item" data-view="conversations">会话</button>
          <button class="nav-item" data-view="settlements">结算</button>
          <span class="nav-section">配置</span>
          <button class="nav-item" data-view="targetTypes">目标渠道</button>
          <button class="nav-item" data-view="budgetOptions">预算选项</button>
          <button class="nav-item" data-view="agent">Agent 设置</button>
        </nav>
        <button id="logoutButton" class="logout-button">退出登录</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1 id="pageTitle">运营总览</h1>
          <div class="topbar-actions">
            <span id="serverStatus" class="status">服务正常</span>
            <button id="createButton" class="primary-button hidden">新增</button>
          </div>
        </header>
        <section id="content" class="content" aria-live="polite"></section>
      </main>
    </div>

    <div id="loginLayer" class="layer">
      <form id="loginForm" class="login-card">
        <div class="brand-mark large">星</div>
        <p class="eyebrow">STARCONNECT ADMIN</p>
        <h2>登录管理后台</h2>
        <p class="muted">使用环境变量中配置的管理员账号。</p>
        <label>
          账号
          <input name="username" autocomplete="username" required />
        </label>
        <label>
          密码
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="loginError" class="form-error"></p>
        <button id="loginButton" class="primary-button wide" type="submit">登录</button>
      </form>
    </div>

    <div id="modalLayer" class="layer hidden">
      <form id="entityForm" class="modal-card">
        <div class="modal-head">
          <div>
            <p class="eyebrow">CONTENT EDITOR</p>
            <h2 id="modalTitle">新增内容</h2>
          </div>
          <button id="closeModal" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <div id="formFields" class="form-grid"></div>
        <p id="formError" class="form-error"></p>
        <div class="modal-actions">
          <button id="cancelModal" class="secondary-button" type="button">取消</button>
          <button id="saveButton" class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </div>

    <div id="confirmLayer" class="layer hidden">
      <div class="confirm-card" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h2 id="confirmTitle">确认操作</h2>
        <p id="confirmMessage" class="muted"></p>
        <div class="modal-actions">
          <button id="confirmCancel" class="secondary-button" type="button">取消</button>
          <button id="confirmAccept" class="danger-button" type="button">确认停用</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/admin/agent.js" defer></script>
    <script src="/admin/app.js" defer></script>
  </body>
</html>
